services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-finance-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - api-finance-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: api-finance-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - api-finance-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: api-finance-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-api_finance}
      MYSQL_USER: ${DB_USERNAME:-finance}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - api-finance-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  api-finance-network:
    driver: bridge

volumes:
  mysqldata:
